<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Генератор ідей</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 30px;
  text-align: center;
}

h1 {
  margin-bottom: 25px;
  font-size: 32px;
}

.wrapper {
  max-width: 1100px;
  margin: auto;
}

/* ====== TABLE ====== */

.table {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
}

.column {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  backdrop-filter: blur(15px);
}

/* ====== HEADERS ====== */

.header {
  font-weight: bold;
  margin-bottom: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  display: inline-block;
}

.sphere { background: #00c6ff; color: black; }
.tech { background: #ff7a18; }
.problem { background: #dd2476; }

/* ====== ITEMS ====== */

.item {
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  transition: 0.3s;
}

.item.used {
  opacity: 0.3;
  text-decoration: line-through;
}

/* ====== RESULTS ====== */

.result-box {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 25px;
}

.result {
  flex: 1;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  font-size: 18px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  backdrop-filter: blur(20px);
}

.result span {
  opacity: 0.7;
  font-size: 14px;
}

/* ====== ANIMATION ====== */

.spin {
  animation: spin 0.5s linear infinite;
}

@keyframes spin {
  0% {transform: translateY(0);}
  100% {transform: translateY(-10px);}
}

/* ====== BUTTONS ====== */

button {
  background: linear-gradient(45deg, #ff512f, #dd2476);
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  color: white;
}

button:hover {
  transform: scale(1.05);
}

.reset {
  margin-left: 10px;
  background: #444;
}

.counter {
  margin-top: 10px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="wrapper">
<h1>🎲 Генератор ідей</h1>

<div class="table">
  <div class="column" id="sphereColumn"></div>
  <div class="column" id="leftColumn"></div>
  <div class="column" id="rightColumn"></div>
</div>

<div class="result-box">
  <div class="result" id="sphereResult"><span>Сфера</span>—</div>
  <div class="result" id="leftResult"><span>Технологія</span>—</div>
  <div class="result" id="rightResult"><span>Проблема</span>—</div>
</div>

<button onclick="generate()">🎲 Згенерувати</button>
<button class="reset" onclick="reset()">🔄 Скинути</button>

<div class="counter" id="counter"></div>
</div>

<script>
const sphereData = [
  "Місто та екологія",
  "Освіта та саморозвиток",
  "Побут та безпека"
];

const leftData = [
  "Мобільний додаток",
  "ШІ (AI)",
  "Смарт-гаджет",
  "VR",
  "Чат-бот",
  "Гейміфікація",
  "QR-коди",
  "Соцмережа"
];

const rightData = [
  "Безпритульні тварини",
  "Стрес і тривожність",
  "Сортування сміття",
  "Шкільні обіди",
  "Безпека ввечері",
  "Вивчення мов",
  "Допомога літнім",
  "Кишенькові гроші"
];

let leftPool = [];
let rightPool = [];

/* ====== RENDER ====== */

function renderList() {
  const sphereCol = document.getElementById("sphereColumn");
  const leftCol = document.getElementById("leftColumn");
  const rightCol = document.getElementById("rightColumn");

  sphereCol.innerHTML = '<div class="header sphere">Сфера</div>';
  leftCol.innerHTML = '<div class="header tech">Технологія</div>';
  rightCol.innerHTML = '<div class="header problem">Проблема</div>';

  sphereData.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = item;
    sphereCol.appendChild(div);
  });

  leftData.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.id = "L-" + item;
    div.textContent = item;
    leftCol.appendChild(div);
  });

  rightData.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.id = "R-" + item;
    div.textContent = item;
    rightCol.appendChild(div);
  });
}

/* ====== ANIMATION ====== */

function spinAnimation(el) {
  el.classList.add("spin");
  let count = 0;

  const interval = setInterval(() => {
    el.innerHTML = "🎲...";
    count++;
    if (count > 10) {
      clearInterval(interval);
      el.classList.remove("spin");
    }
  }, 50);
}

/* ====== GENERATE ====== */

function generate() {

  const sphereEl = document.getElementById("sphereResult");
  const leftEl = document.getElementById("leftResult");
  const rightEl = document.getElementById("rightResult");

  spinAnimation(sphereEl);
  spinAnimation(leftEl);
  spinAnimation(rightEl);

  setTimeout(() => {

    // сфера (без обмежень)
    const sphere = sphereData[Math.floor(Math.random() * sphereData.length)];

    // технологія + проблема (без повторів)
    if (leftPool.length === 0 || rightPool.length === 0) {
      alert("Технології або проблеми закінчились — перезапуск 🔄");
      reset();
      return;
    }

    const lIndex = Math.floor(Math.random() * leftPool.length);
    const rIndex = Math.floor(Math.random() * rightPool.length);

    const left = leftPool.splice(lIndex,1)[0];
    const right = rightPool.splice(rIndex,1)[0];

    sphereEl.innerHTML = "<span>Сфера</span>" + sphere;
    leftEl.innerHTML = "<span>Технологія</span>" + left;
    rightEl.innerHTML = "<span>Проблема</span>" + right;

    document.getElementById("L-" + left).classList.add("used");
    document.getElementById("R-" + right).classList.add("used");

    updateCounter();

  }, 600);
}

/* ====== RESET ====== */

function reset() {
  leftPool = [...leftData];
  rightPool = [...rightData];

  document.querySelectorAll(".item").forEach(el => {
    el.classList.remove("used");
  });

  document.getElementById("sphereResult").innerHTML = "<span>Сфера</span>—";
  document.getElementById("leftResult").innerHTML = "<span>Технологія</span>—";
  document.getElementById("rightResult").innerHTML = "<span>Проблема</span>—";

  updateCounter();
}

/* ====== COUNTER ====== */

function updateCounter() {
  document.getElementById("counter").textContent =
    `Залишилось: ${leftPool.length} × ${rightPool.length}`;
}

/* INIT */
renderList();
reset();
</script>

</body>
</html>
